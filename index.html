<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Road to 2026</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#091a10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Road 2026">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://flagcdn.com">
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --bg-page:#05101f;
  --bg-surface:#040c18;
  --bg-card:#0c1e38;
  --bg-hover:#0f2548;
  --border:#1e3d6e;
  --border-soft:#0f2236;
  --border-tabs:#192f55;
  --accent:#60a5fa;
  --white:oklch(99% 0.005 220);
  --black:oklch(8% 0.005 220);
  --text-muted:#93afc8;
  --text-dim:#5c7d9a;
  --text-dimmer:#3a5470;
  --green:#22c55e;
  --green-bright:#4ade80;
  --red:#f87171;
  --ease-out-expo:cubic-bezier(0.16,1,0.3,1);
  --ease-out:cubic-bezier(0.23,1,0.32,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
*:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
*:focus:not(:focus-visible){outline:none}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
body{background:var(--bg-page);color:var(--white);font-family:system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;width:100%}
header{background:var(--bg-surface);border-bottom:1px solid var(--border-soft);padding:8px 12px;position:sticky;top:0;z-index:50;flex-shrink:0}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px}
.header-title{font-size:0.9375rem;font-weight:900;letter-spacing:.05em;color:var(--accent);display:flex;align-items:center;gap:6px;flex-shrink:0}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:0;flex:1}
.global-badge{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.3);color:var(--accent);font-size:0.6875rem;font-weight:700;padding:3px 10px;border-radius:999px;display:flex;align-items:center;gap:4px;white-space:nowrap}
.global-progress-wrap{width:100%;background:rgba(0,0,0,.4);height:6px;border-radius:999px;overflow:hidden}
.global-progress-fill{background:linear-gradient(90deg,#1d4ed8,var(--accent));height:100%;border-radius:999px;width:100%;transform:scaleX(0);transform-origin:left;transition:transform .5s var(--ease-out-expo);will-change:transform}
.search-wrap{position:relative;margin-bottom:8px}
.search-wrap .sicon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:0.75rem;pointer-events:none}
#search-input{width:100%;background:var(--bg-card);border:1px solid var(--border);color:var(--white);font-size:0.75rem;border-radius:12px;padding:7px 32px 7px 30px;outline:none;transition:border-color .15s}
#search-input:focus{border-color:var(--accent)}
#search-input:focus-visible{box-shadow:0 0 0 2px rgba(96,165,250,.25)}
#search-input::placeholder{color:var(--text-dimmer)}
#clear-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;display:none;font-size:0.8125rem;padding:2px;transition:color .15s}
#clear-btn:hover{color:var(--text-muted)}
.tabs{display:flex;background:var(--bg-card);padding:4px;border-radius:12px;border:1px solid var(--border-tabs);gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:44px;padding:8px 4px 7px;border-radius:8px;border:none;cursor:pointer;transition:background-color .15s,color .15s;background:none;color:var(--text-muted);display:flex;flex-direction:column;align-items:center;gap:4px}
.tab[aria-selected="false"]:hover{background:rgba(255,255,255,.06);color:var(--white)}
.tab-icon-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:24px;height:22px}
.tab-icon-wrap i{font-size:1.125rem}
.tab-label{font-size:0.5625rem;font-weight:700;letter-spacing:0.02em;line-height:1}
.tab.active-faltan{background:#7f1d1d;color:var(--white)}
.tab.active-tengo{background:#14532d;color:var(--white)}
.tab.active-repes{background:#78350f;color:var(--white)}
.tab.active-stats{background:#1e3d6e;color:var(--white)}
.tab.active-share{background:#1e3d6e;color:var(--white)}
.tab.active-backup{background:#1e3d6e;color:var(--white)}
.tab.active-agregar{background:#065f46;color:var(--white)}
.tab-sort-on{background:rgba(96,165,250,.15);color:var(--accent)}
#sort-panel{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;justify-content:flex-end}
.sort-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.65)}
.sort-sheet{position:relative;background:var(--bg-card);border-radius:20px 20px 0 0;padding:16px 16px 32px;border-top:1px solid var(--border)}
.sort-title{font-size:0.6875rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;text-align:center}
.sort-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sort-opt{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:12px 6px;border:1px solid var(--border);background:var(--bg-page);border-radius:10px;cursor:pointer;color:var(--text-muted);transition:all .15s;width:100%}
.sort-opt span{font-size:0.5625rem;font-weight:700;line-height:1.2;text-align:center}
.sort-opt i{font-size:1.0625rem}
.sort-opt:hover{background:var(--bg-hover);color:var(--white)}
.sort-opt.active{background:#1e3d6e;border-color:var(--accent);color:var(--white)}
.sort-opt.active i{color:var(--accent)}
.ag-dd{position:relative;width:100%}
.ag-dd-btn{width:100%;background:var(--bg-page);border:1px solid var(--border);color:var(--white);font-size:0.875rem;border-radius:10px;padding:10px 14px;text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:border-color .15s}
.ag-dd-btn:focus,.ag-dd-btn.open{border-color:var(--accent);outline:none}
.ag-dd-btn span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.ag-dd-btn i{flex-shrink:0;margin-left:8px;font-size:0.7rem;color:var(--text-dim);transition:transform .2s}
.ag-dd-btn.open i{transform:rotate(180deg)}
.ag-dd-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;max-height:260px;overflow:hidden;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.5);display:flex;flex-direction:column}
.ag-dd-search{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.ag-dd-search input{width:100%;background:var(--bg-page);border:1px solid var(--border);color:var(--white);font-size:0.8125rem;border-radius:7px;padding:6px 10px;outline:none}
.ag-dd-search input:focus{border-color:var(--accent)}
.ag-dd-search input::placeholder{color:var(--text-dimmer)}
.ag-dd-opts{overflow-y:auto;flex:1}
.ag-dd-opt{padding:10px 14px;font-size:0.8125rem;cursor:pointer;color:var(--white);transition:background .1s}
.ag-dd-opt:hover{background:var(--bg-hover);color:var(--accent)}
.ag-dd-opt.active{background:var(--bg-hover);color:var(--accent);font-weight:700}
.ag-actions{display:flex;gap:6px;margin-bottom:8px}
.ag-btn-confirm{flex:1;padding:10px;border:none;border-radius:10px;background:#1d4ed8;color:#fff;font-size:0.75rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:filter .15s}
.ag-btn-confirm:hover{filter:brightness(1.15)}
.ag-btn-clear{flex:0 0 auto;padding:10px 14px;border:1px solid rgba(248,113,113,.4);border-radius:10px;background:rgba(127,29,29,.25);color:#f87171;font-size:0.75rem;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .15s}
.ag-btn-clear:hover{background:rgba(127,29,29,.45)}
.numgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
.num-btn{position:relative;padding:11px 4px 11px;border-radius:8px;border:2px solid;font-weight:900;font-size:0.8125rem;cursor:pointer;transition:transform .1s,background-color .1s,box-shadow .1s;text-align:center;line-height:1;background:rgba(127,29,29,.18);border-color:rgba(248,113,113,.3);color:#f87171}
.num-btn.sel{background:rgba(20,83,45,.55);border-color:#4ade80;color:#4ade80;box-shadow:0 0 0 2px rgba(74,222,128,.3);transform:scale(.94)}
.num-count{position:absolute;top:2px;right:3px;font-size:8px;font-weight:900;color:#fff;background:#16a34a;border-radius:4px;padding:0 3px;line-height:14px}
.ag-summary{display:flex;gap:10px;justify-content:center;margin-bottom:10px;font-size:0.75rem;font-weight:800;padding:8px;background:rgba(0,0,0,.2);border-radius:8px}
.ag-sum-tengo{color:#4ade80}
.ag-sum-repe{color:#fde68a}
.ag-preview-list{display:flex;flex-direction:column;gap:4px;margin:10px 0}
.ag-pv-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;font-size:0.6875rem;border:1px solid}
.ag-pv-row.tengo{background:rgba(20,83,45,.25);border-color:rgba(34,197,94,.35)}
.ag-pv-row.repe{background:rgba(120,83,0,.25);border-color:rgba(250,204,21,.35)}
.ag-pv-row.mixed{background:rgba(14,60,40,.25);border-color:rgba(34,197,94,.25)}
.ag-pv-code{font-weight:900;color:var(--white);min-width:52px}
.ag-pv-desc{color:var(--text-muted)}
main{padding:10px 12px;-webkit-overflow-scrolling:touch;flex:1;overflow-y:auto;min-height:0;display:flex;flex-direction:column}
.back-btn{display:none;margin-bottom:8px}
.back-btn button{font-size:0.75rem;font-weight:700;color:var(--accent);background:var(--border-soft);padding:5px 12px;border-radius:12px;border:1px solid var(--border);display:flex;align-items:center;gap:5px;cursor:pointer;transition:background-color .15s,border-color .15s}
.back-btn button:hover{background:var(--bg-hover);border-color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:minmax(68px,1fr);gap:4px;flex:1}
.country-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:6px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:transform 160ms var(--ease-out),background-color 150ms ease;text-align:center;position:relative;appearance:none;-webkit-appearance:none;font-family:inherit;color:var(--white);width:100%;animation:card-enter 180ms var(--ease-out) both;animation-delay:calc(var(--stagger,0)*10ms)}
@media (hover:hover) and (pointer:fine){.country-card:hover{background:var(--bg-hover)}}
.country-card:active{transform:scale(.95)}
.country-card.complete{border-color:var(--accent);box-shadow:0 0 0 1px rgba(96,165,250,.3)}
.complete-badge{position:absolute;top:3px;right:3px;background:var(--accent);color:var(--black);font-size:7px;font-weight:900;padding:1px 3px;border-radius:3px}
.flag-circle{width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:2px;flex-shrink:0}
.flag-circle img{width:34px;height:34px;object-fit:cover;border-radius:50%}
.flag-circle span{font-size:1rem}
.country-code{font-weight:900;font-size:0.6875rem;letter-spacing:.03em}
.country-page{font-size:0.625rem;color:var(--text-muted)}
.progress-bar{width:100%;background:rgba(0,0,0,.4);height:5px;border-radius:999px;overflow:hidden;margin-top:3px}
.progress-fill{background:var(--green);height:100%;border-radius:999px;width:100%;transform:scaleX(0);transform-origin:left;will-change:transform}
.progress-count{font-size:0.625rem;color:var(--accent);font-weight:700;margin-top:2px}
.sticker-card{border:1px solid;border-radius:10px;padding:5px 4px;display:flex;flex-direction:column;justify-content:space-between;gap:3px;position:relative;min-height:68px}
.sticker-card.tengo{background:#123a1f;border-color:rgba(34,197,94,.6)}
.sticker-card.falta{background:#151f19;border-color:rgba(127,29,29,.3);opacity:.8}
.sticker-card.repe{background:#0d1f38;border-color:rgba(96,165,250,.6)}
.sticker-card.escudo.tengo{background:#0d2a4a;border-color:rgba(59,130,246,.6)}
.sticker-card.escudo.falta{background:#0a1e33;border-color:rgba(59,130,246,.2)}
.sticker-card.arquero.tengo{background:#0d3a2a;border-color:rgba(20,184,166,.6)}
.sticker-card.arquero.falta{background:#0a2620;border-color:rgba(20,184,166,.2)}
.sticker-card.equipo.tengo{background:#2d1a4a;border-color:rgba(139,92,246,.6)}
.sticker-card.equipo.falta{background:#1e1230;border-color:rgba(139,92,246,.2)}
.sticker-top{display:flex;flex-direction:column;align-items:center;flex:1;justify-content:center;gap:1px}
.sticker-num{font-weight:900;font-size:0.75rem;color:var(--white)}
.sticker-label{font-size:22px;text-align:center;display:flex;align-items:center;justify-content:center}
.sticker-label i{color:rgba(239,68,68,.8)}
.sticker-card.tengo .sticker-label i{color:rgba(34,197,94,.9)}
.sticker-card.repe .sticker-label i{color:rgba(96,165,250,.9)}
.sticker-status.falta{color:var(--red)}
.repe-badge{position:absolute;top:5px;right:5px;background:var(--accent);color:var(--black);font-size:9px;font-weight:900;padding:2px 5px;border-radius:6px}
.repe-ctrl{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.3);border-radius:6px;padding:2px;gap:2px;margin-top:2px}
.repe-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:none;border-radius:5px;font-size:0.6875rem;cursor:pointer;transition:background-color .1s,color .1s;flex-shrink:0;position:relative}
.repe-btn::after{content:'';position:absolute;inset:-6px}
.repe-btn:active{transform:scale(.88)}
.repe-btn.minus{background:rgba(127,29,29,.25);color:var(--red)}
.repe-btn.minus:hover{background:rgba(127,29,29,.45)}
.repe-btn.plus{background:rgba(20,83,45,.25);color:var(--green-bright)}
.repe-btn.plus:hover{background:rgba(20,83,45,.45)}
.repe-lbl{font-size:8px;font-weight:900;color:var(--text-dim);letter-spacing:.04em}
.stats-section{margin-bottom:16px}
.stats-title{font-size:0.6875rem;font-weight:900;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:12px 10px;text-align:center}
.stat-val{font-size:1.375rem;font-weight:900;color:var(--accent);line-height:1}
.stat-lbl{font-size:0.625rem;color:var(--text-dim);margin-top:4px}
.country-rank{display:flex;flex-direction:column;gap:5px}
.rank-row{display:flex;align-items:center;gap:8px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:7px 10px}
.rank-flag{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center}
.rank-flag img{width:28px;height:28px;object-fit:cover;border-radius:50%}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:0.75rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-bar-wrap{width:100%;background:rgba(0,0,0,.4);height:4px;border-radius:999px;overflow:hidden;margin-top:3px}
.rank-bar-fill{height:100%;border-radius:999px;background:var(--green);width:100%;transform:scaleX(0);transform-origin:left;will-change:transform}
.rank-pct{font-size:0.6875rem;font-weight:900;color:var(--accent);flex-shrink:0;min-width:34px;text-align:right}
.share-box{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:14px}
.share-box textarea{width:100%;background:var(--bg-page);border:1px solid var(--border);color:#d1fae5;font-size:0.6875rem;border-radius:8px;padding:8px;resize:none;outline:none;font-family:monospace;line-height:1.5}
.share-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border:none;border-radius:10px;font-size:0.8125rem;font-weight:800;cursor:pointer;margin-top:8px;transition:opacity .15s,transform .15s,filter .15s}
.share-btn:hover{filter:brightness(1.12)}
.share-btn:active{transform:scale(.97)}
.share-btn.green{background:#16a34a;color:var(--white)}
.share-btn.purple{background:#7c3aed;color:var(--white)}
.share-btn.blue{background:#1d4ed8;color:var(--white)}
.share-lbl{font-size:0.6875rem;font-weight:700;color:var(--text-dim);margin-bottom:6px}
.sort-bar{display:flex;gap:6px;margin-bottom:10px}
.sort-btn{flex:1;padding:5px;font-size:0.625rem;font-weight:700;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;transition:background-color .15s,border-color .15s,color .15s}
.sort-btn:not(.active):hover{background:var(--bg-hover);color:var(--white)}
.sort-btn.active{background:var(--border);color:var(--accent);border-color:var(--accent)}
.no-results{display:none;text-align:center;padding:48px 0;color:var(--text-dimmer);font-size:0.8125rem}
.no-results i{font-size:2rem;margin-bottom:8px;display:block}
footer{background:var(--bg-surface);border-top:1px solid var(--border-soft);padding:10px 16px 20px;flex-shrink:0}
.foot-inner{display:flex;align-items:center;justify-content:space-between;max-width:340px;margin:0 auto}
.nav-btn{width:44px;height:44px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.875rem;transition:background-color .1s,transform .1s;color:var(--white)}
.nav-btn:disabled{opacity:.2;cursor:default}
.nav-btn:not(:disabled):hover{background:var(--bg-hover)}
.nav-btn:not(:disabled):active{transform:scale(.9)}
.page-info{text-align:center}
.page-text{font-size:0.625rem;color:var(--text-dim);font-weight:600;margin-bottom:5px}
.dots{display:flex;justify-content:center;gap:4px;align-items:center}
.dot{height:5px;width:12px;border-radius:999px;background:var(--border);transition:transform .2s,background-color .2s;transform-origin:center}
.dot.active{background:var(--accent);transform:scaleX(1)}
.dot:not(.active){transform:scaleX(0.417)}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--black);padding:7px 18px;border-radius:999px;font-size:0.6875rem;font-weight:900;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap}
#toast.show{opacity:1}
@keyframes card-enter{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{transition-duration:.01ms !important;animation-duration:.01ms !important;animation-delay:0ms !important}
}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="header-top">
    <div class="header-title"><i class="fa-solid fa-trophy" style="color:#eab308" aria-hidden="true"></i> ROAD TO 2026</div>
    <div class="header-right">
      <div class="global-badge"><i class="fa-solid fa-chart-line" aria-hidden="true"></i> <span id="global-counter">0/980 (0%)</span></div>
      <div class="global-progress-wrap"><div class="global-progress-fill" id="global-bar"></div></div>
    </div>
  </div>
  <div class="search-wrap">
    <i class="fa-solid fa-magnifying-glass sicon" aria-hidden="true"></i>
    <label for="search-input" class="sr-only">Buscar país o lámina</label>
    <input type="text" id="search-input" placeholder="Buscar país o lámina (ej: COL 13)...">
    <button id="clear-btn" aria-label="Limpiar búsqueda"><i class="fa-solid fa-circle-xmark" aria-hidden="true"></i></button>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab" id="tab-faltan" role="tab" aria-selected="true" onclick="changeTab('faltan')"><span class="tab-icon-wrap"><i class="fa-solid fa-xmark" aria-hidden="true"></i></span><span class="tab-label">Faltan</span></button>
    <button class="tab" id="tab-tengo" role="tab" aria-selected="false" onclick="changeTab('tengo')"><span class="tab-icon-wrap"><i class="fa-solid fa-circle-check" aria-hidden="true"></i></span><span class="tab-label">Tengo</span></button>

<script>

var COUNTRIES_RAW = [

];

// Países normales: láminas 1-20. FWC: láminas 0-19
var COUNTRIES = COUNTRIES_RAW.map(function(c){
  return {code:c.code,name:c.name,iso:c.iso,page:c.page,from:1,to:20};
});
COUNTRIES.push({code:"FWC",name:"Especiales FIFA",iso:"fwc",page:"Final",from:0,to:19});

var PER_PAGE = 15;
var S = {level:1, country:null, tab:'faltan', page:0, q:'', db:{}, sort:'az'};

// Crear registro limpio para un país
function makeRecord(c){
  var owned={}, repes={};
  for(var i=c.from; i<=c.to; i++){ owned[i]=false; repes[i]=0; }
  return {owned:owned, repes:repes};
}

// Contar láminas de un país
function countOwned(c){
  var rec=S.db[c.code], n=0;
  for(var i=c.from;i<=c.to;i++){ if(rec.owned[i]===true) n++; }
  return n;
}
function countRepes(c){
  var rec=S.db[c.code], n=0;
  for(var i=c.from;i<=c.to;i++){ n+=rec.repes[i]||0; }
  return n;
}
function countTotal(c){ return c.to - c.from + 1; }

function initDB(){
  try{
    var s=localStorage.getItem('panini2026');
    if(s){
      var loaded=JSON.parse(s);
      // Migrar formato antiguo (arrays) a nuevo (objetos)
      COUNTRIES.forEach(function(c){
        if(loaded[c.code]){
          var old=loaded[c.code];
          // Si owned es array, convertir
          if(Array.isArray(old.owned)){
            var rec=makeRecord(c);
            for(var i=c.from;i<=c.to;i++){
              rec.owned[i] = old.owned[i]===true;
              rec.repes[i] = old.repes[i]||0;
            }
            S.db[c.code]=rec;
          } else {
            S.db[c.code]=old;
          }
        }
      });
    }
  }catch(e){}
  // Crear registros faltantes
  COUNTRIES.forEach(function(c){
    if(!S.db[c.code]) S.db[c.code]=makeRecord(c);
  });
  changeTab('faltan');
}

function saveDB(){
  try{ localStorage.setItem('panini2026',JSON.stringify(S.db)); }catch(e){}
}

function updateGlobal(){
  var owned=0, repes=0;
  COUNTRIES.forEach(function(c){ owned+=countOwned(c); repes+=countRepes(c); });
  var missing=TOTAL-owned;
  var pct=Math.round(owned/TOTAL*100);
  document.getElementById('global-counter').textContent=owned+'/'+TOTAL+' ('+pct+'%)';
  document.getElementById('global-bar').style.transform='scaleX('+pct/100+')';
}

var _tt;
function toast(msg){
  var e=document.getElementById('toast');
  e.textContent=msg; e.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(function(){e.classList.remove('show');},900);
}

function setSort(s){ S.sort=s; S.page=0; render(); }

function toggleSortPanel(){
  var p=document.getElementById('sort-panel');
  if(p.style.display==='none'){openSortPanel();}else{closeSortPanel();}
}
function openSortPanel(){
  var p=document.getElementById('sort-panel');
  p.style.display='flex';
  p.querySelectorAll('.sort-opt').forEach(function(btn){
    btn.classList.toggle('active',btn.dataset.sort===S.sort);
  });
  document.getElementById('tab-orden').classList.add('tab-sort-on');
}
function closeSortPanel(){
  document.getElementById('sort-panel').style.display='none';
  document.getElementById('tab-orden').classList.remove('tab-sort-on');
}
function applySort(s){
  S.sort=s; S.page=0;
  closeSortPanel();
  render();
}

function changeTab(t){
  S.tab=t; S.page=0;
  ['faltan','tengo','repes','stats','share','backup','agregar'].forEach(function(x){
    var btn=document.getElementById('tab-'+x);
    btn.className='tab'+(x===t?' active-'+x:'');
    btn.setAttribute('aria-selected',x===t?'true':'false');
  });
  render();
}

// Devuelve lista filtrada según tab activo
function getCountryList(){
  var q=S.q.trim().toLowerCase();
  var list=COUNTRIES.filter(function(c){
    // Filtro búsqueda
    if(q && c.code.toLowerCase().indexOf(q)===-1 && c.name.toLowerCase().indexOf(q)===-1) return false;
    var rec=S.db[c.code];
    var hasTengo=false, hasRepe=false, hasFalta=false;
    for(var i=c.from;i<=c.to;i++){
      if(rec.owned[i]===true){ hasTengo=true; }
      else { hasFalta=true; }
      if((rec.repes[i]||0)>0){ hasRepe=true; }
    }
    if(S.tab==='tengo') return hasTengo;
    if(S.tab==='repes') return hasRepe;
    return hasFalta; // faltan
  });
  if(S.sort==='za'){
    list.sort(function(a,b){return b.name.localeCompare(a.name);});
  } else if(S.sort==='pag-asc'){
    list.sort(function(a,b){var pa=a.page==='Final'?9999:parseInt(a.page);var pb=b.page==='Final'?9999:parseInt(b.page);return pa-pb;});
  } else if(S.sort==='pag-desc'){
    list.sort(function(a,b){var pa=a.page==='Final'?9999:parseInt(a.page);var pb=b.page==='Final'?9999:parseInt(b.page);return pb-pa;});
  } else if(S.sort==='owned-desc'){
    list.sort(function(a,b){return countOwned(b)-countOwned(a);});
  } else if(S.sort==='owned-asc'){
    list.sort(function(a,b){return countOwned(a)-countOwned(b);});
  } else if(S.sort==='escudo'){
    list=list.filter(function(c){return c.code!=='FWC'&&!S.db[c.code].owned[1];});
  } else if(S.sort==='equipo'){
    list=list.filter(function(c){return c.code!=='FWC'&&!S.db[c.code].owned[13];});
  } else if(S.sort==='pct'){
    list.sort(function(a,b){var pa=Math.round(countOwned(a)/countTotal(a)*100);var pb=Math.round(countOwned(b)/countTotal(b)*100);return pb-pa;});
  }
  // 'az' default: COUNTRIES ya está en orden alfabético
  return list;
}

function getStickerList(c){
  var rec=S.db[c.code], arr=[];
  for(var i=c.from;i<=c.to;i++){
    if(S.tab==='tengo'  && rec.owned[i]===true)    arr.push(i);
    if(S.tab==='faltan' && rec.owned[i]!==true)    arr.push(i);
    if(S.tab==='repes'  && (rec.repes[i]||0)>0)   arr.push(i);
  }
  return arr;
}

function stickerLabel(c,n){
  if(c.code==='FWC') return '<i class="fa-solid fa-star" aria-hidden="true" title="Especial"></i>';
  if(n===1) return '<i class="fa-solid fa-shield-halved" aria-hidden="true" title="Escudo"></i>';
  if(n===2) return '<i class="fa-solid fa-hands" aria-hidden="true" title="Arquero"></i>';
  if(n===13) return '<i class="fa-solid fa-users" aria-hidden="true" title="Equipo"></i>';
  return '<i class="fa-solid fa-person-running" aria-hidden="true" title="Jugador"></i>';
}

function renderStats(){
  var sv=document.getElementById('stats-view'); sv.style.display='block';
  var owned=0,repes=0,complete=0;
  COUNTRIES.forEach(function(c){
    var o=countOwned(c); owned+=o; repes+=countRepes(c);
    if(o===countTotal(c)) complete++;
  });
  var missing=TOTAL-owned, pct=Math.round(owned/TOTAL*100);
  var ranked=COUNTRIES.slice().sort(function(a,b){
    return Math.round(countOwned(b)/countTotal(b)*100) - Math.round(countOwned(a)/countTotal(a)*100);
  });
  var html='<div class="stats-section"><div class="stats-title">Resumen general</div><div class="stats-grid">';
  html+='<div class="stat-card"><div class="stat-val">'+owned+'</div><div class="stat-lbl">Láminas tengo</div></div>';
  html+='<div class="stat-card"><div class="stat-val">'+missing+'</div><div class="stat-lbl">Me faltan</div></div>';
  html+='<div class="stat-card"><div class="stat-val">'+repes+'</div><div class="stat-lbl">Repetidas</div></div>';
  html+='<div class="stat-card"><div class="stat-val" style="color:#4ade80">'+complete+'</div><div class="stat-lbl">Países completos</div></div>';
  html+='</div></div><div class="stats-section"><div class="stats-title">Ranking por completado</div><div class="country-rank">';
  ranked.forEach(function(c){
    var o=countOwned(c), t=countTotal(c), p=Math.round(o/t*100);
    var fi=c.iso==='fwc'?'<span style="font-size:1rem">✨</span>':'<img src="https://flagcdn.com/w80/'+c.iso+'.png" loading="lazy" alt="'+c.name+'" style="width:28px;height:28px;object-fit:cover;border-radius:50%">';
    html+='<div class="rank-row"><div class="rank-flag">'+fi+'</div>'+
      '<div class="rank-info"><div class="rank-name">'+c.code+' — '+c.name+'</div>'+
      '<div class="rank-bar-wrap"><div class="rank-bar-fill" style="transform:scaleX('+p/100+')"></div></div></div>'+
      '<div class="rank-pct">'+p+'%</div></div>';
  });
  html+='</div></div>';
  sv.innerHTML=html;
}

function renderShare(){
  var sv=document.getElementById('share-view'); sv.style.display='block';
  var fLines=['🏆 *Road to 2026 — Me faltan:*'], rLines=['🏆 *Road to 2026 — Tengo de más:*'];
  COUNTRIES.forEach(function(c){
    var rec=S.db[c.code], fm=[], rm=[];
    for(var i=c.from;i<=c.to;i++){
      var lbl=i===0?'00':String(i);
      if(rec.owned[i]!==true) fm.push(lbl);
      if((rec.repes[i]||0)>0) rm.push(lbl+'(×'+rec.repes[i]+')');
    }
    if(fm.length) fLines.push('*'+c.code+'*: '+fm.join(', '));
    if(rm.length) rLines.push('*'+c.code+'*: '+rm.join(', '));
  });
  if(fLines.length===1) fLines.push('¡No me falta ninguna! 🎉');
  if(rLines.length===1) rLines.push('No tengo repetidas aún.');
  sv.innerHTML=
    '<div class="share-box"><div class="share-lbl">📋 Me faltan estas láminas:</div>'+
    '<textarea id="txt-faltan" rows="6" readonly>'+fLines.join('\n')+'</textarea>'+
    '<button class="share-btn green" onclick="copyShare(\'faltan\')"><i class="fa-brands fa-whatsapp" aria-hidden="true"></i> Copiar "Me faltan"</button></div>'+
    '<div class="share-box"><div class="share-lbl">🔁 Tengo de más para dar:</div>'+
    '<textarea id="txt-repes" rows="6" readonly>'+rLines.join('\n')+'</textarea>'+
    '<button class="share-btn purple" onclick="copyShare(\'repes\')"><i class="fa-brands fa-whatsapp" aria-hidden="true"></i> Copiar "Tengo de más"</button></div>';
}

function copyShare(type){
  var el=document.getElementById('txt-'+type);
  if(navigator.clipboard){ navigator.clipboard.writeText(el.value).then(function(){ toast('✅ Copiado'); }); }
  else{ el.select(); document.execCommand('copy'); toast('✅ Copiado'); }
}

function renderBackup(){
  var bkv=document.getElementById('backup-view'); bkv.style.display='block';
  bkv.innerHTML=
    '<div class="share-box"><div class="stats-title" style="margin-bottom:8px">💾 Exportar datos</div>'+
    '<div class="share-lbl">Descarga un archivo con todo tu progreso.</div>'+
    '<button class="share-btn green" onclick="exportData()"><i class="fa-solid fa-download" aria-hidden="true"></i> Descargar respaldo</button></div>'+
    '<div class="share-box"><div class="stats-title" style="margin-bottom:8px">📂 Importar datos</div>'+
    '<div class="share-lbl">Restaura tu progreso desde un respaldo.<br><strong style="color:#f87171">Reemplazará tus datos actuales.</strong></div>'+
    '<input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">'+
    '<button class="share-btn blue" onclick="document.getElementById(\'import-file\').click()"><i class="fa-solid fa-upload" aria-hidden="true"></i> Cargar respaldo</button></div>';
}

function exportData(){
  var data={version:2,date:new Date().toISOString(),db:S.db};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='road2026-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  URL.revokeObjectURL(url); toast('✅ Respaldo descargado');
}

function importData(e){
  var file=e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(!data.db) throw new Error('inválido');
      S.db=data.db;
      COUNTRIES.forEach(function(c){ if(!S.db[c.code]) S.db[c.code]=makeRecord(c); });
      saveDB(); updateGlobal(); toast('✅ Datos restaurados'); changeTab('faltan');
    }catch(err){ toast('❌ Archivo inválido'); }
    e.target.value='';
  };
  reader.readAsText(file);
}

        '</button>'+

}

function buildAgDdList(q){
  var opts=document.getElementById('ag-dd-opts'); if(!opts) return;
  q=(q||'').toLowerCase().trim();
  var html='';
  if(!q) html='<div class="ag-dd-opt'+(AG.country?'':' active')+'" onclick="selectAgCountry(null)">— Seleccionar país —</div>';
  COUNTRIES.forEach(function(c){
    if(q && c.code.toLowerCase().indexOf(q)===-1 && c.name.toLowerCase().indexOf(q)===-1) return;
    var active=AG.country&&AG.country.code===c.code;
    html+='<div class="ag-dd-opt'+(active?' active':'')+'" onclick="selectAgCountry(\''+c.code+'\')">'+c.code+' — '+c.name+'</div>';
  });
  opts.innerHTML=html||'<div class="ag-dd-opt" style="color:var(--text-dimmer)">Sin resultados</div>';
}

function filterAgDd(){
  var q=document.getElementById('ag-dd-q').value;
  buildAgDdList(q);
}

function toggleAgDd(){
  var list=document.getElementById('ag-dd-list');
  var btn=document.getElementById('ag-dd-btn');
  var open=list.style.display==='block';
  list.style.display=open?'none':'block';
  btn.classList.toggle('open',!open);
  if(!open){
    var qi=document.getElementById('ag-dd-q');
    if(qi){qi.value='';buildAgDdList();}
    setTimeout(function(){if(qi) qi.focus();},50);
    var actEl=list.querySelector('.active');
    if(actEl) setTimeout(function(){actEl.scrollIntoView({block:'nearest'});},60);
  }
}

function agDdOutside(e){
  var dd=document.getElementById('ag-dd');
  if(dd&&!dd.contains(e.target)){
    var list=document.getElementById('ag-dd-list');
    var btn=document.getElementById('ag-dd-btn');
    if(list) list.style.display='none';
    if(btn) btn.classList.remove('open');
  }
}

function selectAgCountry(code){
  var list=document.getElementById('ag-dd-list');
  var btn=document.getElementById('ag-dd-btn');
  if(list) list.style.display='none';
  if(btn) btn.classList.remove('open');
  if(!code){AG.country=null;AG.counts={};document.getElementById('ag-dd-label').textContent='— Seleccionar país —';document.getElementById('ag-body').innerHTML='';buildAgDdList();return;}
  var c=null; for(var i=0;i<COUNTRIES.length;i++){if(COUNTRIES[i].code===code){c=COUNTRIES[i];break;}}
  AG.country=c; AG.counts={};
  document.getElementById('ag-dd-label').textContent=c.code+' — '+c.name;
  buildAgDdList();
  renderAgBody();
}

function renderAgBody(){
  var c=AG.country; if(!c) return;

  // Grilla de números
  var html='<div class="share-box"><div class="numgrid">';
  for(var n=c.from;n<=c.to;n++){
    var cnt=AG.counts[n]||0;
    var lbl=n===0?'00':String(n);
    html+='<button type="button" class="num-btn'+(cnt>0?' sel':'')+'" onclick="tapAgNum('+n+')">'+
      lbl+(cnt>0?'<span class="num-count">×'+cnt+'</span>':'')+
    '</button>';
  }
  html+='</div>';

  // Resumen + botón limpiar
  var selNums=Object.keys(AG.counts).filter(function(k){return AG.counts[k]>0;});
  if(selNums.length>0){
    var totalCopias=selNums.reduce(function(s,k){return s+AG.counts[k];},0);
    html+='<div class="ag-actions">'+
      '<button class="ag-btn-confirm" onclick="previewAgNum()">'+
        '<i class="fa-solid fa-eye"></i> Ver confirmación ('+totalCopias+' cop.)</button>'+
      '<button class="ag-btn-clear" onclick="AG.counts={};renderAgBody()">'+
        '<i class="fa-solid fa-xmark"></i> Limpiar</button>'+
    '</div>';
  }
  html+='</div><div id="ag-preview"></div>';
  document.getElementById('ag-body').innerHTML=html;
}

function tapAgNum(n){
  AG.counts[n]=(AG.counts[n]||0)+1;
  renderAgBody();
}

function previewAgNum(){
  var c=AG.country; if(!c) return;
  var rec=S.db[c.code];
  var selNums=Object.keys(AG.counts).filter(function(k){return AG.counts[k]>0;})
    .sort(function(a,b){return parseInt(a)-parseInt(b);});
  if(!selNums.length) return;

  var totalTengo=0,totalRepe=0;
  var rowsHtml='';
  selNums.forEach(function(k){
    var n=parseInt(k), cnt=AG.counts[k];
    var owned=rec.owned[n]===true;
    var lbl=n===0?'00':String(n);
    var newTengo=0,newRepe=0;
    if(!owned){ newTengo=1; newRepe=cnt-1; }
    else { newRepe=cnt; }
    totalTengo+=newTengo; totalRepe+=newRepe;

    var rowClass=newTengo>0&&newRepe>0?'mixed':newTengo>0?'tengo':'repe';
    var desc='';
    if(newTengo>0&&newRepe>0) desc='1 a <b style="color:#4ade80">Tengo</b> + '+newRepe+' a <b style="color:#fde68a">Repes</b>';
    else if(newTengo>0) desc='→ <b style="color:#4ade80">Tengo</b>';
    else desc=newRepe+' cop. → <b style="color:#fde68a">Repes</b>';

    rowsHtml+='<div class="ag-pv-row '+rowClass+'">'+
      '<span class="ag-pv-code">'+c.code+' '+lbl+(cnt>1?' ×'+cnt:'')+'</span>'+
      '<span class="ag-pv-desc">'+desc+'</span>'+
    '</div>';
  });

  var html='<div class="share-box">'+
    '<div class="stats-title" style="margin-bottom:8px">Confirmación</div>'+
    '<div class="ag-preview-list">'+rowsHtml+'</div>'+
    '<div class="ag-summary">'+
      (totalTengo?'<span class="ag-sum-tengo"><i class="fa-solid fa-circle-check"></i> '+totalTengo+' a Tengo</span>':'')+
      (totalRepe?'<span class="ag-sum-repe"><i class="fa-solid fa-rotate"></i> '+totalRepe+' a Repes</span>':'')+
    '</div>'+
    '<button class="share-btn green" onclick="applyAgNum()">'+
      '<i class="fa-solid fa-check"></i> Confirmar y agregar</button>'+
  '</div>';
  document.getElementById('ag-preview').innerHTML=html;
  document.getElementById('ag-preview').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function applyAgNum(){
  var c=AG.country; if(!c) return;
  var rec=S.db[c.code]; var tengo=0,repes=0;
  Object.keys(AG.counts).forEach(function(k){
    var n=parseInt(k), cnt=AG.counts[k]; if(!cnt) return;
    if(rec.owned[n]!==true){rec.owned[n]=true; tengo++; cnt--;}
    rec.repes[n]=(rec.repes[n]||0)+cnt; repes+=cnt;
  });
  AG.counts={};
  saveDB(); updateGlobal();
  toast('✅ '+tengo+' a Tengo'+(repes?' · '+repes+' a Repes':''));
  renderAgBody();
}
// ─────────────────────────────────────────────────────────────────────────────

function render(){
  var grid=document.getElementById('grid');
  var sv=document.getElementById('stats-view');
  var shv=document.getElementById('share-view');
  var bkv=document.getElementById('backup-view');
  var agv=document.getElementById('agregar-view');
  var nr=document.getElementById('no-results');
  var bwrap=document.getElementById('back-wrap');

  var footer=document.getElementById('footer');

  // Ocultar todo
  grid.style.display='none';
  sv.style.display='none';
  shv.style.display='none';
  bkv.style.display='none';
  agv.style.display='none';
  nr.style.display='none';
  bwrap.style.display='none';
  footer.style.display='block';

  if(S.tab==='stats'){ renderStats(); footer.style.display='none'; return; }
  if(S.tab==='share'){ renderShare(); footer.style.display='none'; return; }
  if(S.tab==='backup'){ renderBackup(); footer.style.display='none'; return; }
  if(S.tab==='agregar'){ document.removeEventListener('click',agDdOutside); renderAgregar(); footer.style.display='none'; return; }
  document.removeEventListener('click',agDdOutside);

  // Obtener items según nivel
  var items = S.level===1 ? getCountryList() : getStickerList(S.country);
  var perPage = S.level===2 ? 20 : PER_PAGE;

  var totalPages=Math.max(1,Math.ceil(items.length/perPage));
  if(S.page>=totalPages) S.page=totalPages-1;
  if(S.page<0) S.page=0;

  document.getElementById('page-text').textContent='Pág. '+(items.length?S.page+1:0)+' de '+totalPages;
  document.getElementById('prev-btn').disabled=S.page===0;
  document.getElementById('next-btn').disabled=S.page>=totalPages-1||!items.length;

  var dots=document.getElementById('dots'); dots.innerHTML='';
  for(var d=0;d<Math.min(totalPages,7);d++){
    var dot=document.createElement('div');
    dot.className='dot'+(d===S.page?' active':'');
    dots.appendChild(dot);
  }

  // Mostrar/ocultar elementos de navegación
  bwrap.style.display=S.level===2?'block':'none';
  if(S.level===2) document.getElementById('back-label').textContent=S.country.code+' — '+S.country.name+' (Pág. '+S.country.page+')';

  if(!items.length){
    var nrMsg=nr.querySelector('p');
    if(S.q.trim()){
      nrMsg.textContent='Sin resultados para "'+S.q.trim()+'"';
    } else if(S.level===2){
      nrMsg.textContent=S.tab==='tengo'?'Ninguna lámina marcada aún':S.tab==='repes'?'Sin repetidas en este equipo':'¡Equipo completo!';
    } else {
      nrMsg.textContent=S.tab==='tengo'?'Todavía no tenés ninguna lámina':S.tab==='repes'?'Sin repetidas todavía':'¡Álbum completo!';
    }
    nr.style.display='block';
    updateGlobal();
    return;
  }

  var slice=items.slice(S.page*perPage,(S.page+1)*perPage);
  grid.innerHTML='';
  grid.style.display='grid';
  // Si hay pocas filas, limitar altura para que no se estiren de más
  var rowCount=Math.ceil(slice.length/3);
  grid.style.gridAutoRows=rowCount>=4?'minmax(68px,1fr)':'minmax(68px,130px)';

  if(S.level===1){
    slice.forEach(function(c,idx){
      var o=countOwned(c), t=countTotal(c), pct=Math.round(o/t*100);
      var isComplete=(o===t);
      var fi=c.iso==='fwc'?'<span>✨</span>':'<img src="https://flagcdn.com/w80/'+c.iso+'.png" alt="'+c.name+'" loading="lazy" onerror="this.style.display=\'none\'">';
      var btn=document.createElement('button');
      btn.type='button';
      btn.className='country-card'+(isComplete?' complete':'');
      btn.style.setProperty('--stagger',idx);
      btn.innerHTML=(isComplete?'<div class="complete-badge">★ COMPLETO</div>':'')+
        '<div class="flag-circle">'+fi+'</div>'+
        '<div class="country-code">'+c.code+'</div>'+
        '<div class="country-page">Pág. '+c.page+'</div>'+
        '<div class="progress-bar"><div class="progress-fill" style="transform:scaleX('+pct/100+')"></div></div>'+
        '<div class="progress-count">'+o+'/'+t+'</div>';
      btn.onclick=function(cc){return function(){S.level=2;S.country=cc;S.page=0;render();};}(c);
      grid.appendChild(btn);
    });
  } else {
    var c=S.country;
    slice.forEach(function(n){
      var rec=S.db[c.code];
      var have=rec.owned[n]===true;
      var rep=rec.repes[n]||0;
      var numLabel=n===0?'00':String(n);
      var div=document.createElement('div');
      var specialClass=n===1?' escudo':n===2?' arquero':n===13?' equipo':'';
      var stateClass=rep>0?'repe':(have?'tengo':'falta');
      div.className='sticker-card'+specialClass+' '+stateClass;
      div.innerHTML=(rep>0?'<div class="repe-badge">+'+rep+'</div>':'')+
        '<div class="sticker-top">'+
          '<div class="sticker-num">'+c.code+' '+numLabel+'</div>'+
          '<div class="sticker-label">'+stickerLabel(c,n)+'</div>'+
        '</div>'+
        '<div class="repe-ctrl">'+
          '<button type="button" class="repe-btn minus" onclick="changeRepe('+n+',-1)" aria-label="Quitar lámina '+numLabel+'"><i class="fa-solid fa-minus" aria-hidden="true"></i></button>'+
          '<span class="repe-lbl">REPE</span>'+
          '<button type="button" class="repe-btn plus" onclick="changeRepe('+n+',1)" aria-label="Agregar lámina '+numLabel+'"><i class="fa-solid fa-plus" aria-hidden="true"></i></button>'+
        '</div>';
      grid.appendChild(div);
    });
  }
  updateGlobal();
}

function changeRepe(n,val){
  var c=S.country, cc=c.code, rec=S.db[cc], lbl=n===0?'00':String(n);
  var have=rec.owned[n]===true;
  var rep=rec.repes[n]||0;

  if(val>0){
    if(!have){ rec.owned[n]=true; toast('✅ Tengo '+cc+' '+lbl); }
    else{ rec.repes[n]=rep+1; toast('🔁 Repe +1 — '+cc+' '+lbl); }
  } else {
    if(rep>0){ rec.repes[n]=rep-1; toast('➖ Repe -1 — '+cc+' '+lbl); }
    else if(have){ rec.owned[n]=false; rec.repes[n]=0; toast('❌ '+cc+' '+lbl+' vuelve a Faltan'); }
    else { return; }
  }
  saveDB();
  render();
}

function goBack(){S.level=1;S.country=null;S.page=0;render();}
function nextPage(){S.page++;render();}
function prevPage(){if(S.page>0){S.page--;render();}}

var si=document.getElementById('search-input'),cb=document.getElementById('clear-btn');
si.addEventListener('input',function(e){
  S.q=e.target.value; S.page=0;
  cb.style.display=S.q?'block':'none';
  // Si hay espacio, buscar lámina específica
  var q=S.q.trim().toLowerCase();
  if(q.indexOf(' ')>-1){
    var pts=q.split(' '), num=parseInt(pts[1]), found=null;
    COUNTRIES.forEach(function(c){ if(c.code.toLowerCase()===pts[0]||c.name.toLowerCase().indexOf(pts[0])>-1) found=c; });
    if(found&&!isNaN(num)&&num>=found.from&&num<=found.to){
      S.level=2; S.country=found;
      S.page=Math.floor((num-found.from)/PER_PAGE);
      S.q=''; si.value=''; cb.style.display='none';
    }
  }
  render();
});
cb.addEventListener('click',function(){si.value='';S.q='';cb.style.display='none';render();});

var tx=0;
document.getElementById('main').addEventListener('touchstart',function(e){tx=e.changedTouches[0].screenX;},{passive:true});
document.getElementById('main').addEventListener('touchend',function(e){
  var d=tx-e.changedTouches[0].screenX;
  if(Math.abs(d)>60){d>0?nextPage():prevPage();}
});

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){ navigator.serviceWorker.register('/album-fifa-2026/sw.js'); });
}

initDB();
</script>

</html>
